# On push to main: ping home Windows webhook (instant deploy, no 5-min poll)
# Repo Secrets required:
#   HOME_WEBHOOK_URL  e.g. http://47.122.127.145:23334/webhook?token=YOUR_SECRET
#                     or http://gd02.frp0.cc:23334/webhook?token=YOUR_SECRET

name: Trigger home deploy

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    # 家里 Webhook / frp 挂了时不阻塞 push（ci.yml 仍会校验代码）
    continue-on-error: true
    steps:
      - name: Trigger home deploy
        env:
          WEBHOOK_URL: ${{ secrets.HOME_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Skip: HOME_WEBHOOK_URL secret not set"
            exit 0
          fi

          # 从 webhook URL 推导 health URL（同 host:port）
          BASE="${WEBHOOK_URL%%/webhook*}"
          HEALTH_URL="${BASE}/health"

          echo "1/2 Health check: $HEALTH_URL"
          if ! curl -fsS --connect-timeout 15 --max-time 20 "$HEALTH_URL"; then
            echo ""
            echo "::warning::家里 Webhook 不可达（health 失败）。"
            echo "  - Windows 是否运行 run-webhook-watchdog.bat？"
            echo "  - frpc 23334→9100 隧道是否在线？"
            echo "  - 本机测试: Invoke-WebRequest http://127.0.0.1:9100/health"
            exit 1
          fi

          echo ""
          echo "2/2 POST deploy: ${WEBHOOK_URL%%token=*}token=***"
          curl -fsS --connect-timeout 15 --max-time 45 -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo ""
          echo "Deploy triggered on home server."

# 家里服务器 Nginx 站点配置
# 安装: sudo cp deploy/nginx/site.conf /etc/nginx/sites-available/jenrimark
#       sudo ln -s /etc/nginx/sites-available/jenrimark /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8080;
    listen [::]:8080;
    server_name yourdomain.com;

    root /var/www/jenrimark/dist;
    index index.html;

    # 静态资源长缓存（文件名带 hash 时可更安全）
    location ~* \.(css|js|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;
}
